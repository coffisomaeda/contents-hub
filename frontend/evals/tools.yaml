# /api/chat のツール定義（src/routes/api/chat/+server.ts と同じ内容を OpenAI function 形式で再現）
# サーバー側の zod スキーマを変更したら、ここも合わせて更新すること。
# 注意: description に「: 」(コロン+スペース) を含む場合は YAML が誤解釈するため必ずクォートする。
- type: function
  function:
    name: search_and_add_book
    description: '本のタイトルや著者名などのキーワードで検索し、ユーザーのライブラリに登録する。'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: '検索キーワード（例: 本のタイトルや著者名）'
        status:
          type: string
          enum: [want, doing, done]
          description: '読書ステータス'
        rating:
          type: number
          description: '評価（1〜5の数値、任意）'
        memo:
          type: string
          description: '感想やメモ（任意）'
      required: [query, status]

- type: function
  function:
    name: search_and_add_game
    description: 'ゲームのタイトルなどのキーワードで検索し、ユーザーのライブラリに登録する。'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: '検索キーワード（例: ゲームのタイトル）'
        status:
          type: string
          enum: [want, doing, done]
          description: 'プレイステータス'
        rating:
          type: number
          description: '評価（1〜5の数値、任意）'
        memo:
          type: string
          description: '感想やメモ（任意）'
      required: [query, status]

- type: function
  function:
    name: search_and_add_video
    description: '映画やTV番組、アニメなどのキーワードで検索し、ユーザーのライブラリに登録する。'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: '検索キーワード（例: 映画やアニメのタイトル）'
        media_type:
          type: string
          enum: [movie, tv]
          description: 'メディア種別（movie: 映画, tv: TV番組・アニメなど）'
        status:
          type: string
          enum: [want, doing, done]
          description: '視聴ステータス'
        rating:
          type: number
          description: '評価（1〜5の数値、任意）'
        memo:
          type: string
          description: '感想やメモ（任意）'
      required: [query, media_type, status]

- type: function
  function:
    name: search_my_library
    description: 'ユーザーがすでに登録している本・ゲーム・映像作品を検索・一覧して登録情報を確認する。タイトル（部分一致）、ジャンル（media_type）、ステータス、登録日の期間で絞り込める。「登録したものを見せて」「完了した本は？」「先月登録したゲーム」などの確認・フィルタ要求に使う。各条件は任意で、何も指定しなければ登録済みすべてを登録日の新しい順で返す。'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: 'タイトルの部分一致キーワード（任意）'
        media_type:
          type: string
          enum: [book, game, movie, tv]
          description: 'ジャンル/メディア種別（book: 本, game: ゲーム, movie: 映画, tv: TV・アニメ）'
        status:
          type: string
          enum: [want, doing, done]
          description: 'ステータス（want: 気になる, doing: 進行中, done: 完了）'
        registered_from:
          type: string
          description: '登録日の開始（YYYY-MM-DD 形式。その日を含む）'
        registered_to:
          type: string
          description: '登録日の終了（YYYY-MM-DD 形式。その日を含む）'
      required: []
