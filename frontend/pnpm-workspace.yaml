allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# playwright を単一バージョンに固定する。
# promptfoo（→ playwright-extra）が別バージョンの playwright を引き込むと
# @playwright/test とランタイムが二重化し、`playwright test` が
# "two different versions of @playwright/test" で collection に失敗するため。
overrides:
  playwright: 1.61.0
  playwright-core: 1.61.0
