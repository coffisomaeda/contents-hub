<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / secondary, default / active / disabled" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buttons</title>
    <link rel="stylesheet" href="../_tokens.css" />
    <style>
      h2 {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      .sub {
        color: var(--color-ink-muted-48);
        font-size: 14px;
        margin: 0 0 28px;
      }
      .group {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-ink-muted-48);
        margin: 24px 0 12px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .btn-primary {
        background: var(--color-primary);
        color: #fff;
        border: 0;
        border-radius: var(--radius-pill);
        padding: 11px 22px;
        font: inherit;
        font-size: 17px;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      .btn-primary:active {
        transform: scale(0.95);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .btn-secondary {
        background: var(--color-canvas);
        color: var(--color-primary);
        border: 1px solid var(--color-primary);
        border-radius: var(--radius-pill);
        padding: 8px 20px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .btn-secondary:hover {
        background: var(--color-primary);
        color: #fff;
      }

      .demo-active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <h2>Buttons</h2>
      <p class="sub">@utility btn-primary / btn-secondary — pill 形状、active で 0.95 縮小</p>

      <div class="group">Primary</div>
      <div class="row">
        <button class="btn-primary">ログイン</button>
        <button class="btn-primary demo-active">押下中</button>
        <button class="btn-primary" disabled>保存中</button>
      </div>

      <div class="group">Secondary</div>
      <div class="row">
        <button class="btn-secondary">キャンセル</button>
        <button class="btn-secondary" style="background: var(--color-primary); color: #fff">
          hover
        </button>
      </div>
    </div>
  </body>
</html>
