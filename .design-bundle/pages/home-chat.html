<!-- @dsCard group="Pages" name="Home / AI chat" subtitle="/ — AIアシスタントチャット with inline content card" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIアシスタント | Contents Hub</title>
    <link rel="stylesheet" href="_app.css" />
    <style>
      .wrap {
        max-width: 800px;
        margin: 0 auto;
      }
      .head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .chat {
        display: flex;
        flex-direction: column;
        background: var(--color-canvas);
        border: 1px solid var(--color-hairline);
        border-radius: var(--radius-sm);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .msgs {
        padding: 16px;
        display: grid;
        gap: 16px;
      }
      .row {
        display: flex;
      }
      .row.me {
        justify-content: flex-end;
      }
      .bubble {
        max-width: 70%;
        padding: 14px;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-sm);
      }
      .bubble.me {
        background: var(--color-primary);
        color: #fff;
        border-bottom-right-radius: 0;
      }
      .bubble.ai {
        background: var(--color-canvas-parchment);
        border: 1px solid var(--color-divider-soft);
        border-bottom-left-radius: 0;
      }
      .bubble p {
        margin: 0;
      }
      .reg-card {
        display: flex;
        gap: 14px;
        border: 1px solid var(--color-hairline);
        background: var(--color-surface-pearl);
        border-radius: var(--radius-sm);
        padding: 12px;
        margin-top: 12px;
        box-shadow: var(--shadow-sm);
      }
      .reg-card .cover {
        width: 72px;
        height: 96px;
        border-radius: var(--radius-xs);
        background: var(--color-canvas);
        border: 1px solid var(--color-divider-soft);
        display: grid;
        place-items: center;
        color: var(--color-ink-muted-48);
        font-size: 12px;
      }
      .reg-body {
        flex: 1;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .reg-title {
        font-size: 17px;
        font-weight: 600;
        margin: 6px 0 2px;
      }
      .detail-link {
        color: var(--color-primary);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        float: right;
      }
      .composer {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 12px;
        background: var(--color-canvas-parchment);
        border-top: 1px solid var(--color-hairline);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#">Contents Hub</a>
        <nav>
          <a href="#">チャット</a><a href="#">一覧</a><a href="#">登録</a><a href="#">設定</a>
          <span class="who">maechango</span>
          <button class="pill-dark">ログアウト</button>
        </nav>
      </header>
      <main class="main">
        <section class="wrap">
          <div class="head">
            <div>
              <p
                class="eyebrow"
                style="
                  text-transform: none;
                  color: var(--color-primary);
                  font-size: 14px;
                  font-weight: 600;
                  margin: 0;
                "
              >
                AI Agent
              </p>
              <h1 class="t-display-md" style="margin-top: 4px">AIアシスタントチャット</h1>
            </div>
            <button class="btn-ghost t-caption">履歴をクリア</button>
          </div>

          <div class="chat">
            <div class="msgs">
              <div class="row me">
                <div class="bubble me"><p>「君たちはどう生きるか」を完了で登録して</p></div>
              </div>
              <div class="row">
                <div style="max-width: 70%">
                  <div class="bubble ai"><p>「君たちはどう生きるか」を完了で登録しました。</p></div>
                  <article class="reg-card">
                    <div class="cover">No Image</div>
                    <div class="reg-body">
                      <div class="badges">
                        <span class="badge badge-book">書籍</span>
                        <span class="badge badge-done">完了</span>
                      </div>
                      <h2 class="reg-title">君たちはどう生きるか</h2>
                      <p class="t-caption muted" style="margin: 0">著者: 吉野源三郎</p>
                      <div style="margin-top: 8px">
                        <a class="detail-link" href="#">詳細を見る →</a>
                      </div>
                    </div>
                  </article>
                </div>
              </div>
            </div>
            <div class="composer">
              <input
                class="input"
                style="flex: 1; border-radius: var(--radius-xs)"
                placeholder="AIにコンテンツの登録や検索を指示..."
              />
              <button
                class="btn-primary t-util"
                style="border-radius: var(--radius-xs); padding: 10px 20px"
              >
                送信
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
