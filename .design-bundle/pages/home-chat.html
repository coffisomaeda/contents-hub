<!-- @dsCard group="Pages" name="Home / AI chat" subtitle="/ — AIアシスタントチャット with inline content card" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIアシスタント | Contents Hub</title>
    <link rel="stylesheet" href="_app.css" />
    <style>
      .wrap {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 620px;
      }
      .clear-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 16px;
      }
      .clear-btn {
        background: var(--color-canvas);
        border: 1px solid var(--color-hairline);
        border-radius: var(--radius-sm);
        padding: 8px 12px;
        font: inherit;
        font-size: 14px;
        color: var(--color-ink-muted-80);
        cursor: pointer;
      }
      .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--color-canvas);
        border: 1px solid var(--color-hairline);
        border-radius: var(--radius-sm);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .msgs {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: grid;
        gap: 16px;
        align-content: start;
      }
      .row {
        display: flex;
      }
      .row.user {
        justify-content: flex-end;
      }
      .row.model {
        justify-content: flex-start;
      }
      .col {
        max-width: 70%;
      }
      .bubble {
        border-radius: var(--radius-sm);
        padding: 14px;
        font-size: 17px;
        line-height: 1.5;
        box-shadow: var(--shadow-sm);
      }
      .bubble p {
        margin: 0;
        white-space: pre-wrap;
      }
      .bubble.user {
        background: var(--color-primary);
        color: #fff;
        border-bottom-right-radius: 0;
      }
      .bubble.model {
        background: var(--color-canvas-parchment);
        color: var(--color-ink);
        border: 1px solid var(--color-divider-soft);
        border-bottom-left-radius: 0;
      }
      /* 登録成功時のインラインカード */
      .inline-card {
        margin-top: 12px;
        display: flex;
        gap: 14px;
        background: var(--color-surface-pearl);
        border: 1px solid var(--color-hairline);
        border-radius: var(--radius-sm);
        padding: 12px;
        box-shadow: var(--shadow-sm);
      }
      .inline-card .poster {
        width: 72px;
        height: 96px;
        border-radius: var(--radius-xs);
      }
      .inline-card .body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .chips {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .chip {
        padding: 2px 6px;
        border-radius: var(--radius-xs);
        border: 1px solid;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .inline-card h2 {
        font-size: 17px;
        font-weight: 600;
        margin: 6px 0 0;
        color: var(--color-ink);
      }
      .inline-card .sub {
        font-size: 14px;
        color: var(--color-ink-muted-48);
        margin: 2px 0 0;
      }
      .inline-card .foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 8px;
      }
      .rating {
        color: #f59e0b;
        font-weight: 600;
        font-size: 14px;
      }
      .detail-link {
        color: var(--color-primary);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }
      /* タイピングインジケータ */
      .typing {
        background: var(--color-canvas-parchment);
        border: 1px solid var(--color-divider-soft);
        border-radius: var(--radius-sm);
        border-bottom-left-radius: 0;
        padding: 14px;
        display: inline-flex;
        gap: 8px;
        box-shadow: var(--shadow-sm);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--color-primary);
        animation: bounce 0.6s infinite ease-in-out;
      }
      .dot:nth-child(1) {
        animation-delay: -0.3s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.15s;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      /* コンポーザー */
      .composer {
        padding: 12px;
        background: var(--color-canvas-parchment);
        border-top: 1px solid var(--color-hairline);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .composer .input {
        flex: 1;
        border-radius: var(--radius-xs);
      }
      .composer .send {
        border-radius: var(--radius-xs);
        padding: 10px 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#">Contents Hub</a>
        <nav>
          <a href="#">チャット</a><a href="#">一覧</a><a href="#">登録</a><a href="#">設定</a
          ><span class="who">maechango</span><button class="pill-dark">ログアウト</button>
        </nav>
      </header>
      <main class="main">
        <section class="wrap">
          <div class="clear-row">
            <button class="clear-btn" type="button">履歴をクリア</button>
          </div>

          <div class="chat">
            <div class="msgs">
              <!-- ユーザー発話 -->
              <div class="row user">
                <div class="col">
                  <div class="bubble user">
                    <p>君たちはどう生きるか を読み終わった、登録して</p>
                  </div>
                </div>
              </div>

              <!-- モデル応答 + 登録インラインカード -->
              <div class="row model">
                <div class="col">
                  <div class="bubble model">
                    <p>「君たちはどう生きるか」を完了で登録しました。評価とメモも反映済みです。</p>
                  </div>
                  <div class="inline-card">
                    <div
                      class="poster"
                      style="background: linear-gradient(135deg, #dfe7f5, #c3d2ef)"
                    ></div>
                    <div class="body">
                      <div>
                        <div class="chips">
                          <span
                            class="chip"
                            style="
                              border-color: rgba(0, 102, 204, 0.3);
                              background: rgba(0, 102, 204, 0.1);
                              color: var(--color-primary);
                            "
                            >書籍</span
                          >
                          <span
                            class="chip"
                            style="
                              border-color: rgba(21, 128, 61, 0.35);
                              background: rgba(21, 128, 61, 0.1);
                              color: #166534;
                            "
                            >完了</span
                          >
                        </div>
                        <h2>君たちはどう生きるか</h2>
                        <p class="sub">著者: 吉野源三郎</p>
                      </div>
                      <div class="foot">
                        <span class="rating">★ 4</span>
                        <a class="detail-link" href="#">詳細を見る →</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- ユーザー発話（検索） -->
              <div class="row user">
                <div class="col">
                  <div class="bubble user"><p>登録済みの映画を見せて</p></div>
                </div>
              </div>

              <!-- モデル応答 + 検索結果カード -->
              <div class="row model">
                <div class="col">
                  <div class="bubble model"><p>登録済みの映画はこちらです。</p></div>
                  <div class="inline-card" style="margin-top: 12px">
                    <div
                      class="poster"
                      style="
                        width: 54px;
                        height: 72px;
                        background: linear-gradient(135deg, #e7dcf3, #d4c0ec);
                      "
                    ></div>
                    <div class="body" style="justify-content: center; gap: 4px">
                      <div class="chips">
                        <span
                          class="chip"
                          style="
                            border-color: rgba(123, 63, 182, 0.3);
                            background: rgba(123, 63, 182, 0.1);
                            color: #6f35a8;
                          "
                          >映画</span
                        >
                        <span
                          class="chip"
                          style="
                            border-color: rgba(180, 83, 9, 0.35);
                            background: rgba(180, 83, 9, 0.1);
                            color: #92400e;
                          "
                          >進行中</span
                        >
                      </div>
                      <span style="font-weight: 600; color: var(--color-ink)">君の名は。</span>
                      <span style="font-size: 11px; color: var(--color-ink-muted-48)"
                        >登録日: 2026-04-18</span
                      >
                    </div>
                  </div>
                </div>
              </div>

              <!-- 応答待ちのタイピングインジケータ -->
              <div class="row model">
                <div class="typing">
                  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
              </div>
            </div>

            <div class="composer">
              <input class="input" type="text" placeholder="AIにコンテンツの登録や検索を指示..." />
              <button class="btn-primary send" type="button">送信</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
