<!-- @dsCard group="Pages" name="Content registration" subtitle="/contents/new — search by media type + results" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>コンテンツ登録 | Contents Hub</title>
    <link rel="stylesheet" href="_app.css" />
    <style>
      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        display: grid;
        gap: 28px;
      }
      .head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      .head p {
        margin: 0;
        max-width: 620px;
        color: var(--color-ink-muted-80);
      }
      .types {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .type {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--color-divider-soft);
        background: var(--color-canvas);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .type.sel {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }
      .type .ico {
        width: 28px;
        height: 28px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }
      .results {
        display: grid;
        gap: 12px;
      }
      .result {
        display: grid;
        grid-template-columns: 72px 1fr auto;
        gap: 16px;
        padding: 16px;
        align-items: center;
      }
      .result .poster {
        width: 72px;
        height: 96px;
      }
      .result h3 {
        font-size: 17px;
        font-weight: 600;
        margin: 0;
      }
      fieldset {
        border: 0;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 8px;
      }
      legend {
        font-size: 17px;
        font-weight: 600;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#">Contents Hub</a>
        <nav>
          <a href="#">チャット</a><a href="#">一覧</a><a href="#">登録</a><a href="#">設定</a
          ><span class="who">maechango</span><button class="pill-dark">ログアウト</button>
        </nav>
      </header>
      <main class="main">
        <section class="wrap">
          <!-- 見出しは無く、説明文＋ホームリンクのみ -->
          <div class="head">
            <p>設定した検索対象をキーワード検索から登録します。</p>
            <a class="btn-ghost" href="#">ホーム</a>
          </div>

          <section style="display: grid; gap: 16px">
            <div style="display: flex; align-items: center; justify-content: space-between">
              <h2 class="t-tagline">検索</h2>
              <p class="t-caption muted" style="margin: 0">楽天: 有効 / TMDB: 有効</p>
            </div>
            <form style="display: grid; gap: 12px">
              <fieldset>
                <legend>種別</legend>
                <div class="types">
                  <label class="type sel"
                    ><svg class="ico" viewBox="0 0 24 24">
                      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                      <path
                        d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
                      /></svg
                    ><span style="font-weight: 600">書籍</span></label
                  >
                  <label class="type"
                    ><svg class="ico" viewBox="0 0 24 24">
                      <line x1="6" y1="11" x2="10" y2="11" />
                      <line x1="8" y1="9" x2="8" y2="13" />
                      <line x1="15" y1="12" x2="15.01" y2="12" />
                      <line x1="18" y1="10" x2="18.01" y2="10" />
                      <path
                        d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"
                      /></svg
                    ><span style="font-weight: 600">ゲーム</span></label
                  >
                  <label class="type"
                    ><svg class="ico" viewBox="0 0 24 24">
                      <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
                      <path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5" /></svg
                    ><span style="font-weight: 600">映画</span></label
                  >
                  <label class="type"
                    ><svg class="ico" viewBox="0 0 24 24">
                      <rect x="2" y="7" width="20" height="15" rx="2" ry="2" />
                      <polyline points="17 2 12 7 7 2" /></svg
                    ><span style="font-weight: 600">TV</span></label
                  >
                </div>
              </fieldset>
              <label style="display: grid; gap: 8px"
                ><span class="t-body-strong">キーワード</span
                ><input
                  class="input"
                  type="search"
                  value="君たちはどう生きるか"
                  placeholder="タイトルで検索"
              /></label>
              <button class="btn-primary" type="button" style="justify-self: end; min-width: 88px">
                検索
              </button>
            </form>

            <div class="results">
              <article class="card result">
                <div
                  class="poster"
                  style="background: linear-gradient(135deg, #dfe7f5, #c3d2ef)"
                ></div>
                <div>
                  <h3>君たちはどう生きるか</h3>
                  <p class="t-caption muted" style="margin: 4px 0 0">吉野源三郎</p>
                  <p class="t-caption muted80" style="margin: 4px 0 0">
                    コペル君と叔父さんのやりとりを通じて、人間としてどう生きるかを問う名著。
                  </p>
                </div>
                <button class="btn-primary" type="button">登録</button>
              </article>
              <article class="card result">
                <div
                  class="poster"
                  style="background: linear-gradient(135deg, #eef0f3, #dfe2e7)"
                ></div>
                <div>
                  <h3>漫画 君たちはどう生きるか</h3>
                  <p class="t-caption muted" style="margin: 4px 0 0">吉野源三郎 / 羽賀翔一</p>
                </div>
                <button class="btn-primary" type="button">登録</button>
              </article>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
