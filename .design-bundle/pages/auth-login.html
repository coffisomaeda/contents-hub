<!-- @dsCard group="Pages" name="Login page" subtitle="/login — full page with logged-out shell" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン | Contents Hub</title>
    <link rel="stylesheet" href="_app.css" />
    <style>
      .panel {
        max-width: 420px;
        margin: 96px auto 0;
      }
      .panel form {
        display: grid;
        gap: 18px;
      }
      .panel label {
        display: grid;
        gap: 8px;
      }
      .foot {
        color: var(--color-ink-muted-48);
        margin-top: 24px;
        text-align: center;
        font-size: 14px;
      }
      .foot a {
        color: var(--color-primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#">Contents Hub</a>
        <nav>
          <a href="#">ログイン</a>
          <a href="#" class="pill-dark">登録</a>
        </nav>
      </header>
      <main class="main">
        <section class="panel">
          <p class="eyebrow">Login</p>
          <h1 class="t-display-md" style="margin: 8px 0 24px">ログイン</h1>
          <form>
            <label
              ><span class="t-body-strong">メールアドレス</span
              ><input class="input" type="email" autocomplete="email"
            /></label>
            <label
              ><span class="t-body-strong">パスワード</span
              ><input class="input" type="password" autocomplete="current-password"
            /></label>
            <button type="button" class="btn-primary" style="margin-top: 8px; width: 100%">
              ログイン
            </button>
          </form>
          <p class="foot">アカウントがない場合は <a href="#">登録</a></p>
        </section>
      </main>
    </div>
  </body>
</html>
