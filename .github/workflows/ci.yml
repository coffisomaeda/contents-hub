name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    outputs:
      run-e2e: ${{ steps.check-e2e.outputs.run-e2e }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for [run-e2e] in commit message
        id: check-e2e
        run: |
          if git rev-parse HEAD^2 &>/dev/null; then
            COMMIT_MSG=$(git log -1 --format='%s' HEAD^2)
          else
            COMMIT_MSG=$(git log -1 --format='%s')
          fi
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[run-e2e]"* ]]; then
            echo "run-e2e=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install

      - name: Frontend install
        run: pnpm install
        working-directory: frontend

      - name: Lint (root)
        run: pnpm run lint

      - name: Lint (frontend)
        run: pnpm run lint
        working-directory: frontend

      - name: Type check (frontend)
        run: |
          cp .env.example .env
          pnpm wrangler types
          pnpm run check
        working-directory: frontend

  e2e-test:
    needs: lint-and-check
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.lint-and-check.outputs.run-e2e == 'true' ||
      contains(github.event.pull_request.title, '[run-e2e]') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install

      - name: Frontend install
        run: pnpm install
        working-directory: frontend

      - name: Start Supabase
        run: supabase start

      - name: Verify generated types
        run: |
          pnpm run gen:types
          git diff --exit-code src/lib/types/supabase.ts || (echo "::error::Supabase types are out of sync. Please run 'pnpm run gen:types' locally and commit the changes." && exit 1)
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: pnpm test
        working-directory: frontend
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop --project-id contents-hub
