name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install

      - name: Frontend install
        run: pnpm install
        working-directory: frontend

      - name: Lint (root)
        run: pnpm run lint

      - name: Lint (frontend)
        run: pnpm run lint
        working-directory: frontend

      - name: Type check (frontend)
        run: pnpm run check
        working-directory: frontend

      - name: Start Supabase
        run: supabase start

      - name: Verify generated types
        run: |
          pnpm run gen:types
          git diff --exit-code src/lib/types/supabase.ts || (echo "::error::Supabase types are out of sync. Please run 'pnpm run gen:types' locally and commit the changes." && exit 1)
        working-directory: frontend

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: pnpm test
        working-directory: frontend
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop --project-id contents-hub
