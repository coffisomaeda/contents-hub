# sops の暗号化ルール。
# age 公開鍵で暗号化し、対応する秘密鍵（~/.config/sops/age/keys.txt）で復号する。
# 復号には mise 経由で sops/age を使うこと（mise.toml にバージョン固定）。
#
# 暗号化:  sops --encrypt frontend/.env > frontend/.env.enc
# 復号:    sops --decrypt frontend/.env.enc > frontend/.env
# 編集:    sops frontend/.env.enc   （エディタで開き、保存時に再暗号化）
creation_rules:
  # 暗号化済み env ファイル。dotenv 形式として値だけを暗号化する。
  - path_regex: \.env\.enc$
    input_type: dotenv
    age: age1fq08y66dxw2u5ael02k8yl88pac0wj96fmdsyycvwwt6csgekf4sql2yxp
